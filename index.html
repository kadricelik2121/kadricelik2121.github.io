  </style>
<script>

  // ====== Ayarlar ======
  const VALID_PASSWORDS = ["zelal", "Bahtar", "2005"];   // izin verdiğin şifreler
  const DEVICE_ID_KEY = "device_id_v1";          // bu tarayıcıya ait sabit cihaz id
  const SESSION_OK_KEY = "girisYapildi";         // sessionStorage anahtarı
  const SESSION_PW_HASH_KEY = "pwHash";          // sessionStorage: hangi şifre ile giriş yapıldı (hash)
  const WORKER_URL = "https://nameless-resonance-c9ce.kc-kadricelik.workers.dev";

  // Bu tarayıcıda tekil bir cihaz kimliği üret (ilk kez) ve sakla
  function getDeviceId() {
    let id = localStorage.getItem(DEVICE_ID_KEY);
    if (!id) {
      id = (crypto.randomUUID ? crypto.randomUUID() : (Date.now() + "-" + Math.random()));
      localStorage.setItem(DEVICE_ID_KEY, id);
    }
    return id;
  }

  // Şifreyi localStorage anahtarı olarak saklamamak için SHA-256 hash üret
  async function sha256(text) {
    const enc = new TextEncoder().encode(text);
    const buf = await crypto.subtle.digest("SHA-256", enc);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
  }

  async function showContentIfSessionValid() {
    if (sessionStorage.getItem(SESSION_OK_KEY) !== "evet") return;
    // Sekme açıkken tekrar şifre sormadan içeriği göster
    document.getElementById("sifreEkrani").style.display = "none";
    document.getElementById("icerik").style.display = "block";
  }

  window.addEventListener("load", () => {
    // Güvenlik: içerik her zaman kapalı başlar, sadece kontrol sonrası açılır
    document.getElementById("sifreEkrani").style.display = "flex";
    document.getElementById("icerik").style.display = "none";
    showContentIfSessionValid();
  });

  async function kontrolEt() {
    const sifre = document.getElementById("sifre").value.trim();
    if (!sifre) {
      alert("Şifre giriniz.");
      return;
    }

    try {
      const r = await fetch(WORKER_URL + "/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: sifre, deviceId: getDeviceId() })
      });

      const data = await r.json().catch(() => ({}));

      if (!r.ok) {
        if (r.status === 401) {
          alert("❌ Yanlış şifre!");
          return;
        }
        if (r.status === 403 && data && data.reason === "device_mismatch") {
          alert("⛔ Bu şifre başka bir cihaza bağlı. Bu cihazdan giriş yapılamaz.");
          return;
        }
        alert("❌ Giriş yapılamadı. (Worker hata)");
        return;
      }

      // Oturum (sekme kapatılınca biter)
      const pwHash = await sha256(sifre);
      sessionStorage.setItem(SESSION_OK_KEY, "evet");
      sessionStorage.setItem(SESSION_PW_HASH_KEY, pwHash);

      document.getElementById("sifreEkrani").style.display = "none";
      document.getElementById("icerik").style.display = "block";
    } catch (e) {
      alert("❌ Bağlantı hatası. Worker URL doğru mu?");
    }
  }


  // ====== ADMIN SIFIRLAMA (Çözüm 2) ======
  // Kullanım:
  // 1) Önce normal şifre ile giriş yap (icerik açılsın)
  // 2) Adrese #admin ekle: https://.../index.html#admin
  // 3) Açılan pencerede ADMIN TOKEN (Cloudflare Secret: ADMIN_TOKEN) ve hedef şifreyi yaz.
  //
  // Not: Admin paneli sadece giriş yapıldıysa açılır.
  function showAdminPanel() {
    // Zaten açıksa tekrar açma
    if (document.getElementById("adminWrap")) return;

    const wrap = document.createElement("div");
    wrap.id = "adminWrap";
    wrap.style.cssText = `
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      display:flex; align-items:center; justify-content:center; z-index: 100000;
      font-family: Arial, sans-serif;
    `;

    wrap.innerHTML = `
      <div style="width:min(560px,92vw); background:#fff; border-radius:14px; padding:18px; box-shadow:0 10px 30px rgba(0,0,0,.25);">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
          <div style="font-size:18px; font-weight:700;">Admin Şifre Sıfırlama</div>
          <button id="admClose" style="padding:8px 10px; border:1px solid #ccc; background:#fff; border-radius:10px; cursor:pointer;">Kapat ✕</button>
        </div>

        <div style="margin-top:10px; font-size:13px; color:#444;">
          Buradan <b>tek bir şifreyi</b> (örn: <b>zelal</b>) veya <b>ALL</b> yazarak <b>tüm şifre kilitlerini</b> sıfırlayabilirsin.
        </div>

        <div style="margin-top:12px;">
          <label style="font-size:12px; color:#666;">ADMIN TOKEN</label>
          <input id="admTok" type="password" autocomplete="off"
                 style="width:100%; padding:10px; border:1px solid #ccc; border-radius:10px; margin-top:6px;" />
        </div>

        <div style="margin-top:12px;">
          <label style="font-size:12px; color:#666;">Sıfırlanacak şifre (örn: zelal) veya ALL</label>
          <input id="admPw" type="text" autocomplete="off" placeholder="zelal / Bahtar / 2005 / ALL"
                 style="width:100%; padding:10px; border:1px solid #ccc; border-radius:10px; margin-top:6px;" />
        </div>

        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:14px;">
          <button id="admDo" style="padding:10px 14px; border:none; background:#0b57d0; color:#fff; border-radius:10px; cursor:pointer; font-weight:700;">
            Sıfırla
          </button>
        </div>

        <div id="admMsg" style="margin-top:12px; font-size:13px;"></div>
      </div>
    `;

    document.body.appendChild(wrap);

    const close = () => {
      const el = document.getElementById("adminWrap");
      if (el) el.remove();
      if (location.hash === "#admin") history.replaceState(null, "", location.pathname + location.search);
    };

    wrap.addEventListener("click", (e) => { if (e.target === wrap) close(); });
    wrap.querySelector("#admClose").addEventListener("click", close);

    const msg = wrap.querySelector("#admMsg");
    wrap.querySelector("#admDo").addEventListener("click", async () => {
      msg.textContent = "İşlem yapılıyor...";
      msg.style.color = "#333";

      const adminToken = wrap.querySelector("#admTok").value.trim();
      const targetPassword = wrap.querySelector("#admPw").value.trim();

      if (!adminToken || !targetPassword) {
        msg.textContent = "Token ve şifre/ALL boş olamaz.";
        msg.style.color = "crimson";
        return;
      }

      try {
        const r = await fetch(WORKER_URL + "/admin/reset", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ adminToken, targetPassword })
        });

        const data = await r.json().catch(() => ({}));

        if (r.ok && data && data.ok) {
          msg.textContent = "✅ Sıfırlandı. Artık bu şifre yeni cihazda ilk giriş yapan kişiye bağlanacak.";
          msg.style.color = "green";
        } else {
          msg.textContent = "❌ Başarısız. Token yanlış olabilir veya hedef şifre hatalı. (" + ((data && data.reason) ? data.reason : r.status) + ")";
          msg.style.color = "crimson";
        }
      } catch (e) {
        msg.textContent = "❌ Bağlantı hatası: " + (e?.message || e);
        msg.style.color = "crimson";
      }
    });
  }

  function maybeOpenAdmin() {
    // Admin panel sadece #admin varsa ve giriş yapılmışsa açılsın
    if (location.hash !== "#admin") return;

    if (sessionStorage.getItem(SESSION_OK_KEY) !== "evet") {
      alert("Admin paneli için önce giriş yapmalısın.");
      // hash'i temizle
      history.replaceState(null, "", location.pathname + location.search);
      return;
    }
    showAdminPanel();
  }

  window.addEventListener("hashchange", maybeOpenAdmin);
  // Sayfa açılışında da kontrol et
  window.addEventListener("load", maybeOpenAdmin);

</script>
</head>
