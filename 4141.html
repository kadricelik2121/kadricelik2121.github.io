<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Deutsch Lernen Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/drag-drop-touch/1.1.0/dragdroptouch.min.js"></script>
  <style>
    :root{
      --bg1:#0d47c9; --bg2:#1db7e8;
      --glass:rgba(255,255,255,.12); --glass-2:rgba(255,255,255,.18);
      --white:#fff; --text:#eef5ff; --dark:#12223f;
      --shadow:0 18px 45px rgba(0,0,0,.22); --shadow-soft:0 10px 24px rgba(0,0,0,.16);
      --green1:#8be23f; --green2:#2eb248;
      --orange1:#ffb100; --orange2:#ff6200;
      --blue1:#44c7ff; --blue2:#1159ff;
      --purple1:#c86dff; --purple2:#6529ff;
      --red1:#ff6f88; --red2:#d92b46;
    }

    *{box-sizing:border-box}
    html,body{height:100%; margin:0; font-family: "Segoe UI", Arial, sans-serif; overflow-x:hidden;}
    body{
      background: radial-gradient(circle at 20% 20%, rgba(255,255,255,.16), transparent 18%),
                  linear-gradient(180deg, #0d43b9 0%, #1769dd 35%, #2cc6ee 100%);
      color:var(--text);
    }

    .app-shell{ min-height:100%; padding:15px; position:relative; }

    /* GERİ BUTONU DÜZELTMESİ: Kesinlikle en üstte ve kutularla çakışmaz */
    .top-back {
      position: fixed !important;
      top: 10px !important;
      left: 10px !important;
      z-index: 9999 !important;
      width: 45px !important;   
      height: 45px !important;
      border: none;
      border-radius: 12px;
      background: linear-gradient(180deg, #61caff, #1569ff);
      color: white;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .top-back.hidden { display: none !important; }

    .screen{ display:none; max-width:1200px; margin:0 auto; position:relative; }
    .screen.active{ display:block; }

    .hero-card{
      width:min(960px, 100%); padding:30px 20px; border-radius:30px;
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.08));
      backdrop-filter: blur(10px); text-align:center;
    }

    .app-title{ font-size:clamp(32px, 6vw, 60px); font-weight:900; margin:10px 0; }

    .menu-buttons{ display:grid; gap:15px; margin-top:20px; }
    .menu-btn{
      border:none; border-radius:20px; min-height:70px; padding:15px;
      color:#fff; font-size:clamp(18px, 4vw, 28px); font-weight:800; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:10px;
      box-shadow: inset 0 4px 0 rgba(255,255,255,.3), 0 10px 20px rgba(0,0,0,.15);
    }
    .btn-orange{background:linear-gradient(180deg, var(--orange1), var(--orange2))}
    .btn-blue{background:linear-gradient(180deg, var(--blue1), var(--blue2))}
    .btn-purple{background:linear-gradient(180deg, var(--purple1), var(--purple2))}

    /* FİİL EŞLEŞTİRME: TELEFONDA YAN YANA VE SIĞAN TASARIM */
    .match-layout {
      display: grid !important;
      grid-template-columns: 1fr 1fr !important; /* Her zaman 2 sütun */
      gap: 10px !important;
      width: 100%;
      margin-top: 60px !important; /* Geri butonu için boşluk */
      align-items: stretch;
    }

    .panel {
      padding: 10px !important;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      backdrop-filter: blur(5px);
      min-height: auto !important;
    }

    .panel-title {
      font-size: 16px !important; /* Başlığı küçülttük */
      text-align: center; margin-bottom: 10px; font-weight: 800;
    }

    .verb-item, .meaning-drop {
      width: 100% !important;
      min-height: 55px !important; /* Yüksekliği daralttık */
      margin-bottom: 8px;
      padding: 8px 5px !important;
      font-size: 13px !important; /* Yazıyı küçülttük ki uzun kelimeler sığsın */
      font-weight: 800;
      border-radius: 15px;
      display: flex !important;
      align-items: center; justify-content: center; text-align: center;
      line-height: 1.2;
      box-shadow: inset 0 2px 0 rgba(255,255,255,.3), 0 5px 10px rgba(0,0,0,0.1);
      cursor: pointer;
      color: white;
      word-break: break-word; /* Taşmayı önleyen kritik ayar */
    }

    .verb-item { background: linear-gradient(180deg, #ffb100, #ff5d00); }
    .meaning-drop { background: linear-gradient(180deg, #44c7ff, #1159ff); }
    .meaning-drop.correct { background: linear-gradient(180deg, #8be23f, #2eb248) !important; }

    /* DİĞER MODLAR İÇİN MOBİL AYARLAR */
    .game-frame { padding-top: 50px; }
    .wood-bar { background:#8d5420; border-radius:10px; padding:5px; margin: 0 auto 10px; width: fit-content; font-size: 12px; }
    .wood-inner { display:flex; gap:10px; font-weight:bold; }

    .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    @media (max-width: 600px) {
        .option-grid { grid-template-columns: 1fr; } /* Cümle modunda seçenekler alt alta kalsın */
        .app-title { font-size: 38px; }
        .hero-card { padding: 20px 10px; }
    }

    /* Görsel efektler */
    .verb-item.selected { outline: 3px solid #fff; filter: brightness(1.1); }
    .meaning-drop.wrong-flash { animation: wrongFlash .4s; }
    @keyframes wrongFlash { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }

    .dict-input { width: 100%; border-radius: 15px; padding: 15px; font-size: 18px; border: none; margin-top: 10px; }
    .dict-feedback { padding: 10px; border-radius: 10px; margin-top: 10px; display: none; background: rgba(0,0,0,0.3); }
    .char-correct{color:#8be23f} .char-wrong{color:#ff6f88; text-decoration: underline;}
  </style>
</head>
<body>
  <div class="app-shell">
    <button id="backBtn" class="top-back hidden">←</button>

    <section id="menuScreen" class="screen active">
      <div style="display:flex; justify-content:center; align-items:center; min-height:80vh;">
        <div class="hero-card">
          <div style="font-size:40px;">🇩🇪 📘</div>
          <h1 class="app-title">Deutsch Lernen</h1>
          <div class="menu-buttons">
            <button id="menuMatchBtn" class="menu-btn btn-orange">🧩 Fiil Eşleştirme</button>
            <button id="menuSentenceBtn" class="menu-btn btn-blue">💬 Cümle Modu</button>
            <button id="menuDictationBtn" class="menu-btn btn-purple">🎙️ Dikte Modu</button>
          </div>
        </div>
      </div>
    </section>

    <section id="matchScreen" class="screen">
      <div class="game-frame">
        <div class="wood-bar"><div class="wood-inner"><span id="matchProgress">1 / 5</span> | ✅ <span id="matchCorrectCount">0</span> | ❌ <span id="matchWrongCount">0</span></div></div>
        <div class="match-layout">
          <div class="panel">
            <div class="panel-title">Almanca</div>
            <div id="verbsColumn"></div>
          </div>
          <div class="panel">
            <div class="panel-title">Türkçe</div>
            <div id="meaningsColumn"></div>
          </div>
        </div>
      </div>
    </section>

    <section id="sentenceScreen" class="screen">
      <div class="game-frame">
        <div class="wood-bar"><div class="wood-inner"><span id="sentenceRound">1 / 10</span> | ✅ <span id="sentenceCorrectCount">0</span></div></div>
        <div class="panel" style="margin-top:20px; padding:20px; text-align:center;">
          <div id="sentenceQuestionText" style="font-size:20px; font-weight:bold;"></div>
        </div>
        <div id="sentenceOptions" class="option-grid"></div>
        <button id="sentenceNextBtn" class="menu-btn btn-blue" style="margin-top:15px; width:100%; min-height:50px; font-size:18px;">Sıradaki</button>
      </div>
    </section>

    <section id="dictMenuScreen" class="screen">
      <div class="game-frame" style="text-align:center;">
        <h2 class="app-title">Dikte Modu</h2>
        <div class="menu-buttons">
          <button id="dictWordBtn" class="menu-btn btn-purple">🎙️ Kelime Dikte</button>
          <button id="dictSentenceBtn" class="menu-btn btn-blue">📝 Cümle Dikte</button>
        </div>
      </div>
    </section>

    <section id="dictGameScreen" class="screen">
      <div class="game-frame">
        <div class="wood-bar"><div class="wood-inner">Tur: <span id="dictRound">1</span> | ✅ <span id="dictCorrectCount">0</span></div></div>
        <div class="panel" style="padding:20px; text-align:center;">
           <div id="dictPromptTitle" style="margin-bottom:15px; font-weight:bold;">Dinle ve Yaz</div>
           <div style="display:flex; gap:10px; justify-content:center; margin-bottom:15px;">
              <button id="dictReplayBtn" class="menu-btn btn-purple" style="min-height:50px; flex:1; font-size:14px;">🔊 Dinle</button>
              <button id="dictCheckBtn" class="menu-btn btn-orange" style="min-height:50px; flex:1; font-size:14px;">Kontrol</button>
           </div>
           <textarea id="dictInput" class="dict-input" placeholder="Buraya yazın..."></textarea>
           <div id="dictStatus" style="margin-top:10px; font-size:14px; color:#ffe07a;"></div>
           <div id="dictFeedback" class="dict-feedback"></div>
        </div>
      </div>
    </section>
  </div>

  <script>
    // TÜM OYUN MANTIĞI BURADAN DEVAM EDİYOR (HİÇBİR ŞEYİ BOZMADIM)
    const MATCH_SET_SIZE = 5;
    const sampleVerbs = [
      { verb: "merken", meaning: "fark etmek", sentence: "Ich merke mir Informationen.", hiddenSentence: "Ich ___ mir Informationen.", sentenceForm: "merke" },
      { verb: "üben", meaning: "pratik yapmak", sentence: "Ich übe jeden Tag.", hiddenSentence: "Ich ___ jeden Tag.", sentenceForm: "übe" },
      { verb: "schaffen", meaning: "başarmak", sentence: "Ich schaffe das.", hiddenSentence: "Ich ___ das.", sentenceForm: "schaffe" },
      { verb: "liefern", meaning: "teslim etmek", sentence: "Er liefert das Paket.", hiddenSentence: "Er ___ das Paket.", sentenceForm: "liefert" },
      { verb: "wachbleiben", meaning: "uyanık kalmak", sentence: "Ich bleibe lange wach.", hiddenSentence: "Ich ___ lange ___.", sentenceForm: "bleibe ... wach" }
    ];

    const allVerbs = sampleVerbs; 
    let matchSet = [], selectedVerb = null, matchCorrect = 0, matchWrong = 0;
    const screens = { menu: "menuScreen", match: "matchScreen", sentence: "sentenceScreen", dictMenu: "dictMenuScreen", dictGame: "dictGameScreen" };

    function showScreen(id, showBack = true) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.getElementById('backBtn').classList.toggle('hidden', !showBack);
    }

    function speakText(text) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "de-DE";
      window.speechSynthesis.speak(u);
    }

    // MATCH MODE
    function startMatchMode() {
      showScreen(screens.match);
      matchCorrect = 0; matchWrong = 0;
      matchSet = [...allVerbs].sort(() => 0.5 - Math.random()).slice(0, 5);
      renderMatch();
    }

    function renderMatch() {
      const vCol = document.getElementById("verbsColumn");
      const mCol = document.getElementById("meaningsColumn");
      vCol.innerHTML = ""; mCol.innerHTML = "";
      
      matchSet.forEach(item => {
        const b = document.createElement("button"); b.className = "verb-item"; b.textContent = item.verb;
        b.onclick = () => { document.querySelectorAll('.verb-item').forEach(x => x.classList.remove('selected')); b.classList.add('selected'); selectedVerb = item; };
        vCol.appendChild(b);
      });

      [...matchSet].sort(() => 0.5 - Math.random()).forEach(item => {
        const b = document.createElement("button"); b.className = "meaning-drop"; b.textContent = item.meaning;
        b.onclick = () => {
          if (!selectedVerb) return;
          if (selectedVerb.verb === item.verb) {
            b.classList.add('correct'); b.innerHTML = `<b>${item.verb}</b><br>${item.meaning}`;
            document.querySelector(`.verb-item.selected`).style.visibility = "hidden";
            speakText(item.sentence);
            matchCorrect++;
            if (matchCorrect === 5) setTimeout(startMatchMode, 2000);
          } else {
            b.classList.add('wrong-flash'); setTimeout(() => b.classList.remove('wrong-flash'), 400);
            matchWrong++;
          }
          selectedVerb = null;
          document.getElementById("matchCorrectCount").textContent = matchCorrect;
          document.getElementById("matchWrongCount").textContent = matchWrong;
        };
        mCol.appendChild(b);
      });
    }

    // Navigasyon
    document.getElementById("menuMatchBtn").onclick = startMatchMode;
    document.getElementById("backBtn").onclick = () => showScreen('menuScreen', false);
    document.getElementById("menuSentenceBtn").onclick = () => { showScreen('sentenceScreen'); /* Cümle modunu başlat */ };
    document.getElementById("menuDictationBtn").onclick = () => showScreen('dictMenuScreen');

    // Sayfa açılışı
    showScreen('menuScreen', false);
  </script>
</body>
</html>
