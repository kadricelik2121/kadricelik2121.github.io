<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Deutsch Lernen Pro</title>
  <style>
    :root{
      --bg1:#0d47c9; --bg2:#1db7e8; --glass:rgba(255,255,255,.12); --glass-2:rgba(255,255,255,.18);
      --white:#fff; --text:#eef5ff; --dark:#12223f; --shadow:0 18px 45px rgba(0,0,0,.22);
      --shadow-soft:0 10px 24px rgba(0,0,0,.16); --green1:#8be23f; --green2:#2eb248;
      --orange1:#ffb100; --orange2:#ff6200; --blue1:#44c7ff; --blue2:#1159ff;
      --purple1:#c86dff; --purple2:#6529ff; --red1:#ff6f88; --red2:#d92b46;
      --wood1:#a66a2d; --wood2:#7a4415;
    }

    *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
    html,body{ height: 100%; margin:0; padding:0; overflow-x:hidden; }
    
    body{
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #0d43b9 0%, #1769dd 35%, #2cc6ee 100%);
      background-attachment: fixed;
      color:var(--text);
    }

    /* Genel Konteyner */
    .app-shell{ 
      min-height: 100vh;
      padding: clamp(10px, 3vw, 20px);
      display: flex;
      flex-direction: column;
    }

    .screen{ display:none; max-width:1100px; margin:0 auto; width: 100%; animation: fadeIn 0.4s ease; }
    .screen.active{ display:block; }

    @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

    /* Üst Geri Butonu */
    .top-back{
      position: fixed; top: 15px; left: 15px; z-index: 100;
      width: 50px; height: 50px; border:none; border-radius:15px;
      background: linear-gradient(180deg, #61caff, #1569ff);
      color: white; font-size: 24px; font-weight: bold; cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    /* Ana Menü Tasarımı */
    .hero-wrap{ min-height: 80vh; display: flex; align-items: center; justify-content: center; }
    .hero-card{
      width: 100%; max-width: 600px; padding: 30px 20px;
      background: rgba(255,255,255,0.15); backdrop-filter: blur(15px);
      border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); text-align: center;
    }

    .app-title{ font-size: clamp(32px, 8vw, 64px); font-weight: 900; margin: 0; text-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .app-subtitle{ font-size: clamp(14px, 3vw, 18px); opacity: 0.8; margin-bottom: 30px; }

    .menu-buttons{ display: flex; flex-direction: column; gap: 15px; }
    .menu-btn{
      padding: 18px; border: none; border-radius: 20px;
      font-size: clamp(18px, 4vw, 24px); font-weight: 800; color: white;
      cursor: pointer; transition: 0.2s; box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    }
    .menu-btn:active{ transform: scale(0.98); }

    .btn-orange{ background: linear-gradient(180deg, var(--orange1), var(--orange2)); }
    .btn-blue{ background: linear-gradient(180deg, var(--blue1), var(--blue2)); }
    .btn-purple{ background: linear-gradient(180deg, var(--purple1), var(--purple2)); }

    /* Skor ve Bilgi Barı */
    .wood-bar{
      background: linear-gradient(180deg, #c58945, #8d5420);
      padding: 10px 20px; border-radius: 50px; width: fit-content;
      margin: 80px auto 20px; border: 3px solid #5d3310;
    }
    .wood-inner{ display: flex; gap: 15px; font-weight: bold; font-size: 14px; }

    /* Eşleştirme Modu - Responsive Grid */
    .match-layout{
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px; margin-top: 20px;
    }
    @media (min-width: 600px) { .match-layout { grid-template-columns: 1fr 1fr; } }

    .panel{ background: rgba(0,0,0,0.2); padding: 15px; border-radius: 25px; min-height: 200px; }
    .panel-title{ text-align: center; margin-top: 0; font-size: 22px; }

    .verb-item, .meaning-drop{
      background: var(--glass); border: 2px solid rgba(255,255,255,0.2);
      border-radius: 15px; padding: 15px; margin-bottom: 10px;
      min-height: 60px; display: flex; align-items: center; justify-content: center;
      text-align: center; font-size: clamp(16px, 4vw, 20px); font-weight: bold;
    }

    /* Cümle Modu */
    .speech-bubble{
      background: white; color: var(--dark); padding: 30px;
      border-radius: 30px; margin-bottom: 20px; text-align: center;
      box-shadow: var(--shadow);
    }
    .sentence-text{ font-size: clamp(20px, 5vw, 32px); font-weight: 700; margin: 0; }
    .option-grid{ display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 600px) { .option-grid { grid-template-columns: 1fr 1fr; } }
    
    .option-btn{
      padding: 20px; border: none; border-radius: 15px; background: var(--blue1);
      color: white; font-weight: bold; font-size: 18px; cursor: pointer;
    }

    /* Dikte Modu */
    .dict-home-grid{ display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
    .dict-card{
      background: var(--glass-2); padding: 30px; border-radius: 25px;
      text-align: center; font-size: 24px; font-weight: bold; cursor: pointer;
    }
    .dict-input{
      width: 100%; border-radius: 15px; padding: 15px; border: none;
      font-size: 18px; margin: 15px 0; outline: none;
    }
    .dict-controls{ display: flex; gap: 10px; flex-wrap: wrap; }
    .mini-btn{ flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }

    /* Popup/Overlay */
    .overlay{
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .big-overlay-card{
      background: white; color: var(--dark); padding: 30px; border-radius: 30px;
      text-align: center; width: 100%; max-width: 500px;
    }

    /* Drag & Drop için yardımcı sınıflar */
    .dragging { opacity: 0.5; transform: scale(0.95); }
    .drag-over { background: rgba(255,255,255,0.3) !important; border-color: var(--green1) !important; }
  </style>
</head>
<body>

  <div class="app-shell">
    <button class="top-back" id="backBtn" style="display:none;">&larr;</button>

    <div id="menuScreen" class="screen active">
      <div class="hero-wrap">
        <div class="hero-card">
          <h1 class="app-title">DEUTSCH</h1>
          <p class="app-subtitle">Lernen mit Spaß & Spiel</p>
          <div class="menu-buttons">
            <button class="menu-btn btn-orange" id="menuMatchBtn">Eşleştirme Oyunu</button>
            <button class="menu-btn btn-blue" id="menuSentenceBtn">Cümle Tamamlama</button>
            <button class="menu-btn btn-purple" id="menuDictationBtn">Dikte Çalışması</button>
          </div>
        </div>
      </div>
    </div>

    <div id="matchScreen" class="screen">
      <div class="wood-bar">
        <div class="wood-inner">
          <span>Skor: <span id="matchScore">0</span></span>
          <span>Süre: <span id="matchTime">0</span>s</span>
        </div>
      </div>
      <div class="match-layout">
        <div class="panel">
          <h3 class="panel-title">Fiiller</h3>
          <div id="verbList"></div>
        </div>
        <div class="panel">
          <h3 class="panel-title">Anlamlar</h3>
          <div id="meaningList"></div>
        </div>
      </div>
    </div>

    <div id="sentenceScreen" class="screen">
      <div class="wood-bar">
        <div class="wood-inner">
          <span>Skor: <span id="sentScore">0</span></span>
        </div>
      </div>
      <div class="speech-bubble">
        <p class="sentence-text" id="sentenceArea"></p>
        <p style="margin-top:10px; color:#666; font-style:italic;" id="sentenceTr"></p>
      </div>
      <div class="option-grid" id="optionGrid"></div>
    </div>

    <div id="dictMenuScreen" class="screen">
      <div class="hero-wrap">
        <div class="hero-card">
          <h2 class="panel-title">Dikte Modu Seç</h2>
          <div class="dict-home-grid">
            <div class="dict-card" id="dictWordBtn" style="background:var(--blue1)">Kelime</div>
            <div class="dict-card" id="dictSentenceBtn" style="background:var(--purple1)">Cümle</div>
          </div>
        </div>
      </div>
    </div>

    <div id="dictGameScreen" class="screen">
      <div class="wood-bar">
        <div class="wood-inner">Skor: <span id="dictScore">0</span></div>
      </div>
      <div class="speech-bubble">
        <div id="dictVisualHint" style="font-size:40px; margin-bottom:10px;">🎧</div>
        <p class="sentence-text" id="dictMeaningText" style="color:#555">Anlamı burada görünecek...</p>
      </div>
      <textarea class="dict-input" id="dictInput" placeholder="Duyduğunu yaz..."></textarea>
      <div class="dict-controls">
        <button class="mini-btn btn-blue" id="dictListenBtn">Tekrar Dinle</button>
        <button class="mini-btn btn-orange" id="dictCheckBtn">Kontrol Et</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="big-overlay-card">
      <div id="overlayIcon" style="font-size:60px; margin-bottom:20px;"></div>
      <div id="overlayMsg"></div>
      <button class="menu-btn btn-blue" style="width:100%; margin-top:20px;" id="overlayNextBtn">Devam Et</button>
    </div>
  </div>

  <script>
    /* VERİ SETİ - BURAYA İSTEDİĞİN KADAR EKLEME YAPABİLİRSİN */
    const allVerbs = [
      { de: "bestellen", tr: "sipariş vermek", sentence: "Ich bestelle bugün online bir kitap.", sentenceForm: "bestelle" },
      { de: "unterschreiben", tr: "imzalamak", sentence: "Ich unterschreibe den Vertrag bugün.", sentenceForm: "unterschreibe" },
      { de: "kündigen", tr: "feshetmek", sentence: "Ich kündige meinen Vertrag.", sentenceForm: "kündige" },
      { de: "anerkennen", tr: "tanımak", sentence: "Die Behörde erkennt mein Diplom an.", sentenceForm: "erkennt ... an" },
      { de: "ausfüllen", tr: "doldurmak", sentence: "Ich fülle das Formular aus.", sentenceForm: "fülle ... aus" },
      { de: "stattfinden", tr: "gerçekleşmek", sentence: "Das Meeting findet morgen statt.", sentenceForm: "findet ... statt" }
      // ... Diğer verilerini buraya aynı formatta ekle
    ];

    /* DEĞİŞKENLER */
    let currentScore = 0;
    let timerInterval;
    let seconds = 0;
    let currentTask = null;
    let dictMode = "word";

    const screens = ["menu", "match", "sentence", "dictMenu", "dictGame"];
    const backBtn = document.getElementById("backBtn");

    /* NAVIGATION */
    function showScreen(screenId) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(screenId + "Screen").classList.add("active");
      backBtn.style.display = screenId === "menu" ? "none" : "block";
      if(screenId !== "match") clearInterval(timerInterval);
    }

    /* MATCH MODE LOGIC */
    function startMatchMode() {
      showScreen("match");
      currentScore = 0; seconds = 0;
      document.getElementById("matchScore").innerText = "0";
      timerInterval = setInterval(() => { seconds++; document.getElementById("matchTime").innerText = seconds; }, 1000);
      renderMatch();
    }

    function renderMatch() {
      const verbList = document.getElementById("verbList");
      const meaningList = document.getElementById("meaningList");
      verbList.innerHTML = ""; meaningList.innerHTML = "";

      let items = [...allVerbs].sort(() => 0.5 - Math.random()).slice(0, 5);
      let shuffledMeanings = [...items].sort(() => 0.5 - Math.random());

      items.forEach(item => {
        let div = document.createElement("div");
        div.className = "verb-item";
        div.innerText = item.de;
        div.draggable = true;
        div.dataset.verb = item.de;
        div.addEventListener("dragstart", (e) => { e.dataTransfer.setData("text", item.de); div.classList.add("dragging"); });
        div.addEventListener("dragend", () => div.classList.remove("dragging"));
        verbList.appendChild(div);
      });

      shuffledMeanings.forEach(item => {
        let div = document.createElement("div");
        div.className = "meaning-drop";
        div.innerText = item.tr;
        div.dataset.verb = item.de;
        
        // Mobile Touch Support ve Desktop Drag support
        div.addEventListener("dragover", (e) => { e.preventDefault(); div.classList.add("drag-over"); });
        div.addEventListener("dragleave", () => div.classList.remove("drag-over"));
        div.addEventListener("drop", (e) => {
          e.preventDefault();
          div.classList.remove("drag-over");
          let draggedVerb = e.dataTransfer.getData("text");
          if(draggedVerb === div.dataset.verb) {
            div.style.background = "var(--green2)";
            div.style.color = "white";
            currentScore += 10;
            document.getElementById("matchScore").innerText = currentScore;
            // Eşleşen fiili gizle
            document.querySelector(`.verb-item[data-verb="${draggedVerb}"]`).style.visibility = "hidden";
            checkMatchFinish();
          } else {
            showOverlay("❌", "Yanlış Eşleşme!", false);
          }
        });
        meaningList.appendChild(div);
      });
    }

    function checkMatchFinish() {
      const remaining = Array.from(document.querySelectorAll(".verb-item")).filter(i => i.style.visibility !== "hidden");
      if(remaining.length === 0) {
        showOverlay("🎉", `Tebrikler! Skoru: ${currentScore}`, true, () => startMatchMode());
      }
    }

    /* SENTENCE MODE */
    function startSentenceMode() {
      showScreen("sentence");
      nextSentence();
    }

    function nextSentence() {
      currentTask = allVerbs[Math.floor(Math.random() * allVerbs.length)];
      const area = document.getElementById("sentenceArea");
      const trArea = document.getElementById("sentenceTr");
      const grid = document.getElementById("optionGrid");
      
      let displaySent = currentTask.sentence.replace(currentTask.sentenceForm, "_______");
      area.innerText = displaySent;
      trArea.innerText = currentTask.tr;
      grid.innerHTML = "";

      let options = [currentTask.sentenceForm];
      while(options.length < 4) {
        let r = allVerbs[Math.floor(Math.random() * allVerbs.length)].sentenceForm;
        if(!options.includes(r)) options.push(r);
      }
      options.sort(() => 0.5 - Math.random());

      options.forEach(opt => {
        let btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerText = opt;
        btn.onclick = () => {
          if(opt === currentTask.sentenceForm) {
            currentScore += 20;
            document.getElementById("sentScore").innerText = currentScore;
            showOverlay("✅", "Harika!", true, () => nextSentence());
          } else {
            showOverlay("❌", `Yanlış! Doğrusu: ${currentTask.sentenceForm}`, false);
          }
        };
        grid.appendChild(btn);
      });
    }

    /* DICTATION MODE */
    function startDictMenu() { showScreen("dictMenu"); }
    function startDictGame(mode) {
      dictMode = mode;
      showScreen("dictGame");
      nextDict();
    }

    function nextDict() {
      currentTask = allVerbs[Math.floor(Math.random() * allVerbs.length)];
      document.getElementById("dictMeaningText").innerText = currentTask.tr;
      document.getElementById("dictInput").value = "";
      speak(dictMode === "word" ? currentTask.de : currentTask.sentence);
    }

    function speak(text) {
      window.speechSynthesis.cancel();
      let msg = new SpeechSynthesisUtterance(text);
      msg.lang = "de-DE";
      msg.rate = 0.8;
      window.speechSynthesis.speak(msg);
    }

    /* OVERLAY SYSTEM */
    function showOverlay(icon, msg, isSuccess, callback) {
      const ov = document.getElementById("overlay");
      document.getElementById("overlayIcon").innerText = icon;
      document.getElementById("overlayMsg").innerText = msg;
      ov.style.display = "flex";
      document.getElementById("overlayNextBtn").onclick = () => {
        ov.style.display = "none";
        if(callback) callback();
      };
    }

    /* EVENT LISTENERS */
    document.getElementById("menuMatchBtn").onclick = startMatchMode;
    document.getElementById("menuSentenceBtn").onclick = startSentenceMode;
    document.getElementById("menuDictationBtn").onclick = startDictMenu;
    document.getElementById("dictWordBtn").onclick = () => startDictGame("word");
    document.getElementById("dictSentenceBtn").onclick = () => startDictGame("sentence");
    document.getElementById("dictListenBtn").onclick = () => speak(dictMode === "word" ? currentTask.de : currentTask.sentence);
    document.getElementById("dictCheckBtn").onclick = () => {
      let val = document.getElementById("dictInput").value.trim().toLowerCase();
      let target = (dictMode === "word" ? currentTask.de : currentTask.sentence).toLowerCase();
      if(val === target) {
        currentScore += 30;
        document.getElementById("dictScore").innerText = currentScore;
        showOverlay("⭐", "Mükemmel Duyum!", true, () => nextDict());
      } else {
        showOverlay("👂", `Doğrusu: ${target}`, false);
      }
    };
    backBtn.onclick = () => {
      showScreen("menu");
      window.speechSynthesis.cancel();
    };

  </script>
</body>
</html>
